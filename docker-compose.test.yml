services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: photocurate
      POSTGRES_PASSWORD: photocurate
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: --auth-host=trust --auth-local=trust
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photocurate -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata_test: