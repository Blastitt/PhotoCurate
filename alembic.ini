# A generic, single database configuration.

[alembic]
# path to migration versions
script_location = alembic
# template used for new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path for 'env.py' to load the app
prepend_sys_path = src

# Database URL (overridden by env.py from app settings)
sqlalchemy.url = postgresql+asyncpg://photocurate:photocurate@localhost:5432/photocurate

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
